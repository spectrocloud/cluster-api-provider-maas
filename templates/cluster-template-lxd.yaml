# LXD workload cluster template.
#
# Each machine is created as an LXD VM on the HCP hosts via the per-machine
# spec.lxd block. vmConfig.network attaches the VM to a single subnet (eth0).
# The VM Evacuation Controller (VEC) acts on workload clusters automatically.
#
# Render with envsubst, e.g.:
#   export CLUSTER_NAME=wlc NAMESPACE=default KUBERNETES_VERSION=v1.26.4 ...
#   envsubst < templates/cluster-template-lxd.yaml | kubectl apply -f -
# Or with clusterctl: clusterctl generate cluster <name> --flavor lxd
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  clusterNetwork:
    services:
      cidrBlocks: ["10.96.0.0/12"]
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    serviceDomain: "cluster.local"
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: MaasCluster
    name: ${CLUSTER_NAME}

---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasCluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  dnsDomain: ${DNS_DOMAIN}

---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: "${KUBERNETES_VERSION}"
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: "${CLUSTER_NAME}-control-plane"
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        extraArgs:
          - name: anonymous-auth
            value: "true"
          - name: authorization-mode
            value: RBAC,Node
          - name: default-not-ready-toleration-seconds
            value: "60"
          - name: default-unreachable-toleration-seconds
            value: "60"
          - name: disable-admission-plugins
            value: AlwaysAdmit
          - name: enable-admission-plugins
            value: AlwaysPullImages,NamespaceLifecycle,ServiceAccount,NodeRestriction
      controllerManager:
        extraArgs:
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: terminated-pod-gc-threshold
            value: "25"
          - name: use-service-account-credentials
            value: "true"
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    preKubeadmCommands:
      - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
        sleep 1; done
      - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
      - swapoff -a

---
# Control-plane VMs created as LXD VMs on the HCP hosts.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-control-plane
spec:
  template:
    spec:
      failureDomain: ${LXD_ZONE}
      image: ${MACHINE_IMAGE}
      minCPU: ${CONTROL_PLANE_MACHINE_MINCPU}
      minMemory: ${CONTROL_PLANE_MACHINE_MINMEMORY}
      resourcePool: ${LXD_RESOURCE_POOL}
      # Create this machine as an LXD VM on an HCP host.
      lxd:
        enabled: true
        vmConfig:
          diskSize: ${CONTROL_PLANE_MACHINE_MINSTORAGE}
          autoStart: true
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
      cluster.x-k8s.io/deployment-name: ${CLUSTER_NAME}-md-0
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
        cluster.x-k8s.io/deployment-name: ${CLUSTER_NAME}-md-0
    spec:
      clusterName: ${CLUSTER_NAME}
      version: ${KUBERNETES_VERSION}
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: ${CLUSTER_NAME}-md-0
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: ${CLUSTER_NAME}-md-0
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      failureDomain: ${WORKER_ZONE}
      minCPU: ${WORKER_MACHINE_MINCPU}
      minMemory: ${WORKER_MACHINE_MINMEMORY}
      image: ${WORKER_MACHINE_IMAGE}
      resourcePool: ${WORKER_MACHINE_RESOURCEPOOL}
      tags: [ ${ WORKER_MACHINE_TAG } ]
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: event-qps
              value: "0"
            - name: feature-gates
              value: RotateKubeletServerCertificate=true
            - name: read-only-port
              value: "0"
          name: '{{ v1.local_hostname }}'
      preKubeadmCommands:
        - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
          sleep 1; done
        - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
        - swapoff -a
