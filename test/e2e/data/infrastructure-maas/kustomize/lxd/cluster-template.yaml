# Base resources for the "lxd" (WLC) MAAS e2e cluster-template flavor.
# Identical to the default flavor, except the control-plane MaasMachineTemplate carries a
# spec.lxd block so the control-plane machine is provisioned as an LXD VM on a pre-existing MAAS
# LXD host. Workers remain bare-metal. This file uses clusterctl ${...} substitution variables;
# they are resolved by clusterctl at apply time, not by kustomize. The CNI ClusterResourceSet
# wiring and the matching "cni" label on the Cluster are layered on by the kustomization in this
# directory.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasCluster
metadata:
  name: "${CLUSTER_NAME}"
spec:
  dnsDomain: ${MAAS_DNS_DOMAIN}
  # Declare the failure domain at the cluster level so the controller advertises it in
  # MaasCluster.status.FailureDomains (with ControlPlane=true). The CAPI framework's
  # AssertControlPlaneFailureDomains requires every control-plane machine's spec.failureDomain
  # (set via the MaasMachineTemplate below) to be a member of this set, otherwise the QuickStart
  # spec fails with "expecting one of the failure domain defined at cluster level".
  failureDomains:
    - ${FAILURE_DOMAIN}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: "${CLUSTER_NAME}"
spec:
  clusterNetwork:
    services:
      cidrBlocks: ["10.96.0.0/12"]
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    serviceDomain: "cluster.local"
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: "${CLUSTER_NAME}-control-plane"
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: MaasCluster
    name: "${CLUSTER_NAME}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  template:
    spec:
      minCPU: ${CONTROL_PLANE_MACHINE_MINCPU}
      minMemory: ${CONTROL_PLANE_MACHINE_MINMEMORY}
      image: ${CONTROL_PLANE_MACHINE_IMAGE}
      resourcePool: ${CONTROL_PLANE_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
      # Create the control-plane machine as an LXD VM on a pre-existing MAAS LXD host.
      lxd:
        enabled: true
        vmConfig:
          diskSize: ${LXD_VM_DISK_SIZE}
          autoStart: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: "${KUBERNETES_VERSION}"
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: "${CLUSTER_NAME}-control-plane"
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        extraArgs:
          - name: anonymous-auth
            value: "true"
          - name: authorization-mode
            value: RBAC,Node
          - name: default-not-ready-toleration-seconds
            value: "60"
          - name: default-unreachable-toleration-seconds
            value: "60"
          - name: disable-admission-plugins
            value: AlwaysAdmit
          - name: enable-admission-plugins
            value: AlwaysPullImages,NamespaceLifecycle,ServiceAccount,NodeRestriction
      controllerManager:
        extraArgs:
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: terminated-pod-gc-threshold
            value: "25"
          - name: use-service-account-credentials
            value: "true"
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    preKubeadmCommands:
      - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
        sleep 1; done
      - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
      - swapoff -a
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      minCPU: ${WORKER_MACHINE_MINCPU}
      minMemory: ${WORKER_MACHINE_MINMEMORY}
      image: ${WORKER_MACHINE_IMAGE}
      resourcePool: ${WORKER_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  clusterName: "${CLUSTER_NAME}"
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: "${CLUSTER_NAME}"
  template:
    spec:
      clusterName: "${CLUSTER_NAME}"
      version: "${KUBERNETES_VERSION}"
      # Pin the worker pool to the failure domain at the MachineDeployment level (the canonical CAPI
      # field). It propagates to each worker Machine.spec.failureDomain, which the framework's
      # AssertMachineDeploymentFailureDomains requires to equal the MachineDeployment's value. The
      # MAAS provider also reflects the infra MaasMachine's failure domain onto the Machine, so this
      # must match the failureDomain set on the worker MaasMachineTemplate above.
      failureDomain: ${FAILURE_DOMAIN}
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: "${CLUSTER_NAME}-md-0"
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: "${CLUSTER_NAME}-md-0"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: event-qps
              value: "0"
            - name: feature-gates
              value: RotateKubeletServerCertificate=true
            - name: read-only-port
              value: "0"
          name: '{{ v1.local_hostname }}'
      preKubeadmCommands:
        - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
          sleep 1; done
        - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
        - swapoff -a
