# Base resources for the "hcp-upgrades" (Host Control Plane) MAAS e2e cluster-template flavor.
# Same as the "hcp" flavor (spec.lxdConfig.enabled: true; bare-metal machines registered as LXD
# hosts), but parameterized for a K8s version upgrade: the initial control-plane / md-0
# MaasMachineTemplates use the UPGRADE_FROM image, and two extra templates (control-plane-upgrade /
# md-0-upgrade) carry the UPGRADE_TO image. ClusterUpgradeConformanceSpec repoints the KCP/MD to the
# *-upgrade templates and bumps the version.
#
# There is NO CNI ClusterResourceSet here: HCP must use Cilium (Calico breaks the LXD bridge on the
# PXE interface), and the hcp upgrade spec applies Cilium directly to the workload cluster via the
# control-plane-initialized waiter (ciliumControlPlaneWaiters). The Cilium DaemonSet then covers the
# new nodes rolled in during the upgrade automatically.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasCluster
metadata:
  name: "${CLUSTER_NAME}"
spec:
  dnsDomain: ${MAAS_DNS_DOMAIN}
  failureDomains:
    - ${FAILURE_DOMAIN}
  lxdConfig:
    enabled: true
    storageBackend: zfs
    skipNetworkUpdate: true
    storageSize: "${LXD_STORAGE_SIZE}"
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: "${CLUSTER_NAME}"
spec:
  clusterNetwork:
    services:
      cidrBlocks: ["10.96.0.0/12"]
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    serviceDomain: "cluster.local"
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: "${CLUSTER_NAME}-control-plane"
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: MaasCluster
    name: "${CLUSTER_NAME}"
---
# Initial control-plane host (UPGRADE_FROM image), bare metal, acts as an LXD host.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  template:
    spec:
      minCPU: ${CONTROL_PLANE_MACHINE_MINCPU}
      minMemory: ${CONTROL_PLANE_MACHINE_MINMEMORY}
      minDiskSize: ${LXD_HOST_MIN_DISK}
      image: ${CONTROL_PLANE_MACHINE_IMAGE_UPGRADE_FROM}
      resourcePool: ${CONTROL_PLANE_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
---
# Upgrade-target control-plane host (UPGRADE_TO image). Fixed name.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "control-plane-upgrade"
spec:
  template:
    spec:
      minCPU: ${CONTROL_PLANE_MACHINE_MINCPU}
      minMemory: ${CONTROL_PLANE_MACHINE_MINMEMORY}
      minDiskSize: ${LXD_HOST_MIN_DISK}
      image: ${CONTROL_PLANE_MACHINE_IMAGE_UPGRADE_TO}
      resourcePool: ${CONTROL_PLANE_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: "${KUBERNETES_VERSION}"
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: "${CLUSTER_NAME}-control-plane"
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        extraArgs:
          - name: anonymous-auth
            value: "true"
          - name: authorization-mode
            value: RBAC,Node
          - name: default-not-ready-toleration-seconds
            value: "60"
          - name: default-unreachable-toleration-seconds
            value: "60"
          - name: disable-admission-plugins
            value: AlwaysAdmit
          - name: enable-admission-plugins
            value: AlwaysPullImages,NamespaceLifecycle,ServiceAccount,NodeRestriction
      controllerManager:
        extraArgs:
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: terminated-pod-gc-threshold
            value: "25"
          - name: use-service-account-credentials
            value: "true"
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        kubeletExtraArgs:
          - name: event-qps
            value: "0"
          - name: feature-gates
            value: RotateKubeletServerCertificate=true
          - name: read-only-port
            value: "0"
        name: '{{ v1.local_hostname }}'
    preKubeadmCommands:
      - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
        sleep 1; done
      - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
      - swapoff -a
---
# Initial worker host (UPGRADE_FROM image), bare metal, acts as an LXD host.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      minCPU: ${WORKER_MACHINE_MINCPU}
      minMemory: ${WORKER_MACHINE_MINMEMORY}
      minDiskSize: ${LXD_HOST_MIN_DISK}
      image: ${WORKER_MACHINE_IMAGE_UPGRADE_FROM}
      resourcePool: ${WORKER_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
---
# Upgrade-target worker host (UPGRADE_TO image). Fixed name.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: MaasMachineTemplate
metadata:
  name: "md-0-upgrade"
spec:
  template:
    spec:
      minCPU: ${WORKER_MACHINE_MINCPU}
      minMemory: ${WORKER_MACHINE_MINMEMORY}
      minDiskSize: ${LXD_HOST_MIN_DISK}
      image: ${WORKER_MACHINE_IMAGE_UPGRADE_TO}
      resourcePool: ${WORKER_MACHINE_RESOURCEPOOL}
      failureDomain: ${FAILURE_DOMAIN}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  clusterName: "${CLUSTER_NAME}"
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: "${CLUSTER_NAME}"
  template:
    spec:
      clusterName: "${CLUSTER_NAME}"
      version: "${KUBERNETES_VERSION}"
      failureDomain: ${FAILURE_DOMAIN}
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: "${CLUSTER_NAME}-md-0"
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MaasMachineTemplate
        name: "${CLUSTER_NAME}-md-0"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-md-0"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: event-qps
              value: "0"
            - name: feature-gates
              value: RotateKubeletServerCertificate=true
            - name: read-only-port
              value: "0"
          name: '{{ v1.local_hostname }}'
      preKubeadmCommands:
        - while [ ! -S /var/run/containerd/containerd.sock ]; do echo 'Waiting for containerd...';
          sleep 1; done
        - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
        - swapoff -a
