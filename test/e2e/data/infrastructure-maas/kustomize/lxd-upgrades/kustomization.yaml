apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# WLC nodes are ordinary LXD VMs, so Calico is fine here (the Cilium-on-host rule is HCP-only). Reuse
# the default flavor's Calico CRS + cni label patch (built with --load_restrictor LoadRestrictionsNone
# because of the ../main references).
resources:
  - cluster-template.yaml
  - ../main/cluster-resource-set.yaml
patches:
  - path: ../main/cni-label-patch.yaml
    target:
      group: cluster.x-k8s.io
      version: v1beta2
      kind: Cluster
      name: ".*"
