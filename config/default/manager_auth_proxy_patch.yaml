# This patch inject a sidecar container which is a HTTP proxy for the 
# controller manager, it performs RBAC authorization against the Kubernetes API using SubjectAccessReviews.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: kube-rbac-proxy
        image: quay.io/brancz/kube-rbac-proxy:v0.19.1
        args:
        - "--secure-listen-address=0.0.0.0:8443"
        - "--upstream=http://127.0.0.1:8080/"
        - "--logtostderr=true"
        - "--v=10"
        ports:
        - containerPort: 8443
          name: https
      - name: manager
        args:
        - "--metrics-bind-addr=127.0.0.1:8080"
        - "--leader-elect"
        # Role of this controller manager. Set via clusterctl variable substitution
        # at `clusterctl init` time, e.g. CAPMAAS_CLUSTER_ROLE=wlc or CAPMAAS_CLUSTER_ROLE=hcp.
        # Defaults to "standard" when the variable is not set (clusterctl treats an
        # empty default as a required variable, so the default must be non-empty):
        #   standard -> base infrastructure controllers only
        #   wlc      -> additionally enables the VM evacuation controller
        #   hcp      -> additionally enables the HMC maintenance controller
        - "--cluster-role=${CAPMAAS_CLUSTER_ROLE:=standard}"
