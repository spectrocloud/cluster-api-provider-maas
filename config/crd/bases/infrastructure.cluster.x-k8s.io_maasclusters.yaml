                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failureDomains:
                description: |-
                  FailureDomains don't mean much in CAPMAAS since it's all local, but we can see how the rest of cluster API
                  will use this if we populate it.
                items:
                  description: |-
                    FailureDomain is the Schema for Cluster API failure domains.
                    It allows controllers to understand how many failure domains a cluster can optionally span across.
                  properties:
                    attributes:
                      additionalProperties:
                        type: string
                      description: attributes is a free form map of attributes an
                        infrastructure provider might use or require.
                      type: object
                    controlPlane:
                      description: controlPlane determines if this failure domain
                        is suitable for use by control plane machines.
                      type: boolean
                    name:
                      description: name is the name of the failure domain.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              initialization:
                description: initialization provides observations of the MaasCluster
                  initialization process.
                properties:
                  provisioned:
                    description: |-
                      provisioned is true when the infrastructure provider reports that the
                      Cluster's infrastructure is fully provisioned.
                    type: boolean
                type: object
              network:
                description: Network represents the network
                properties:
                  dnsName:
                    description: DNSName is the Kubernetes api server name
                    type: string
                type: object
              ready:
                default: false
                description: |-
                  INSERT ADDITIONAL STATUS FIELD - define observed state of cluster
                  Important: Run "make" to regenerate code after modifying this file
                  Ready denotes that the maas cluster (infrastructure) is ready.
                type: boolean
            required:
            - ready
            type: object
        type: object
    served: true
    storage: true
    subresources:
