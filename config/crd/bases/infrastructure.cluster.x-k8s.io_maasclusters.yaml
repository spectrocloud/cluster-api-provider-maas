kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: maasclusters.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: MaasCluster
    listKind: MaasClusterList
    plural: maasclusters
    singular: maascluster
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: MaasCluster is the Schema for the maasclusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MaasClusterSpec defines the desired state of MaasCluster
            properties:
              controlPlaneEndpoint:
                description: ControlPlaneEndpoint represents the endpoint used to
                  communicate with the control plane.
                properties:
                  host:
                    description: Host is the hostname on which the API server is serving.
                    type: string
                  port:
                    description: Port is the port on which the API server is serving.
                    type: integer
                required:
                - host
                - port
                type: object
              dnsDomain:
                description: DNSDomain configures the MaaS domain to create the cluster
                  on (e.g maas)
                minLength: 1
                type: string
              failureDomains:
                description: |-
                  FailureDomains are not usually defined on the spec.
                  but useful for MaaS since we can limit the domains to these
                items:
                  type: string
                type: array
              lxdConfig:
                description: LXDConfig contains the configuration for LXD hosts
                properties:
                  enabled:
                    default: false
                    description: Enabled specifies whether to enable LXD VM support
                    type: boolean
                  networkBridge:
                    description: NetworkBridge specifies the network bridge to use
                      (legacy, prefer NICParent)
                    type: string
                  nicParent:
                    description: NICParent selects the parent interface or bridge
                      for the NIC
                    type: string
                  nicType:
                    description: NICType selects the LXD NIC type (bridge or macvlan)
                    enum:
                    - bridge
                    - macvlan
                    type: string
                  resourcePool:
                    description: ResourcePool specifies the MAAS resource pool to
                      use for LXD VM hosts
                    type: string
                  skipNetworkUpdate:
                    default: true
                    description: SkipNetworkUpdate specifies whether to skip updating
                      existing networks
                    type: boolean
                  storageBackend:
                    default: zfs
                    description: StorageBackend specifies the storage backend to use
                      (zfs, dir, etc.)
                    type: string
                  storageSize:
                    default: "50"
                    description: StorageSize specifies the size of the storage pool
                      in GB
                    type: string
                  zone:
                    description: Zone specifies the MAAS availability zone to register
                      LXD VM hosts in
                    type: string
                type: object
            required:
