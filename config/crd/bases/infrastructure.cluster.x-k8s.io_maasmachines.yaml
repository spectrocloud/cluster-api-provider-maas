---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: maasmachines.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: MaasMachine
    listKind: MaasMachineList
    plural: maasmachines
    singular: maasmachine
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: MaasMachine is the Schema for the maasmachines API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MaasMachineSpec defines the desired state of MaasMachine
            properties:
              deployInMemory:
                default: false
                description: DeployInMemory indicates to maas to deploy machine in
                  memory
                type: boolean
              failureDomain:
                description: |-
                  FailureDomain is the failure domain the machine will be created in.
                  Must match a key in the FailureDomains map stored on the cluster object.
                type: string
              image:
                description: Image will be the MaaS image id
                minLength: 1
                type: string
              lxd:
                description: |-
                  LXD contains configuration for creating this machine as an LXD VM on a host
                  when enabled. When nil or disabled, this machine is created on bare metal.
                properties:
                  enabled:
                    default: false
                    description: Enabled specifies whether this machine should be
                      created as an LXD VM
                    type: boolean
                  vmConfig:
                    description: VMConfig contains additional VM configuration
                    properties:
                      autoStart:
                        default: true
                        description: AutoStart specifies whether the VM should automatically
                          start
                        type: boolean
                      diskSize:
                        default: 60
                        description: DiskSize is the size of the VM disk in GB
                        type: integer
                      interfaceLinkModes:
                        additionalProperties:
                          type: string
                        description: |-
                          InterfaceLinkModes sets the MAAS link mode per interface (e.g. eth0, eth1, eth2).
                          Keys are interface names ("eth0", "eth1", ...); values: "auto", "dhcp", "static", "link_up".
                          When unset for an interface: eth0 defaults to "auto", others to "dhcp". Extensible for future interfaces.
                        type: object
                      network:
                        description: Network is the network to connect the VM to
                        type: string
                      storagePool:
                        description: StoragePool is the storage pool to use for the
                          VM
                        type: string
                    type: object
                type: object
              minCPU:
                description: MinCPU minimum number of CPUs
                minimum: 0
                type: integer
              minDiskSize:
                description: MinDiskSizeInGB minimum disk size in GB
                minimum: 0
                type: integer
              minMemory:
                description: MinMemoryInMB minimum memory in MB
                minimum: 0
                type: integer
              parent:
                description: Parent is the system ID of the parent host machine (for
                  LXD VMs)
                type: string
              providerID:
                description: ProviderID will be the name in ProviderID format (maas://<zone>/system_id)
                type: string
              resourcePool:
                description: ResourcePool will be the MAAS Machine resourcepool
                type: string
              systemID:
                description: SystemID will be the MaaS machine ID
                type: string
              tags:
                description: Tags for placement
                items:
                  type: string
                type: array
            required:
            - image
            - minCPU
            - minMemory
            type: object
          status:
            description: MaasMachineStatus defines the observed state of MaasMachine
            properties:
              addresses:
                description: Addresses contains the associated addresses for the maas
                  machine.
                items:
                  description: MachineAddress contains information for the node's
                    address.
                  properties:
                    address:
                      description: address is the machine address.
                      maxLength: 256
                      minLength: 1
                      type: string
                    type:
                      description: type is the machine address type, one of Hostname,
                        ExternalIP, InternalIP, ExternalDNS or InternalDNS.
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: Conditions defines current service state of the MaasMachine.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dnsAttached:
                description: DNSAttached specifies whether the DNS record contains
                  the IP of this machine
                type: boolean
              failureMessage:
                description: |-
                  FailureMessage will be set in the event that there is a terminal problem
                  reconciling the Machine and will contain a more verbose string suitable
                  for logging and human consumption.
                type: string
              failureReason:
                description: |-
                  FailureReason will be set in the event that there is a terminal problem
                  reconciling the Machine and will contain a succinct value suitable
                  for machine interpretation.
                type: string
              hostname:
                description: Hostname is the actual MaaS hostname
                type: string
              initialization:
                description: initialization provides observations of the MaasMachine
                  initialization process.
                properties:
                  provisioned:
                    description: |-
                      provisioned is true when the infrastructure provider reports that the
                      Machine's infrastructure is fully provisioned.
                    type: boolean
                type: object
              machinePowered:
                description: MachinePowered is if the machine is "Powered" on
                type: boolean
              machineState:
                description: MachineState is the state of this MAAS machine.
                type: string
              ready:
                default: false
                description: Ready denotes that the machine (maas container) is ready
                type: boolean
            required:
            - ready
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
