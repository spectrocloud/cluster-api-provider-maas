commonLabels:
  cluster.x-k8s.io/v1alpha3: v1alpha3
  cluster.x-k8s.io/v1alpha4: v1alpha4
  cluster.x-k8s.io/v1beta1: v1beta1
  # v1beta2 contract (CAPI >= v1.11) is satisfied by this provider's v1beta1 API.
  # Required so v1beta2 core can resolve apiGroup-only infrastructureRefs.
  cluster.x-k8s.io/v1beta2: v1beta1

# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/infrastructure.cluster.x-k8s.io_maasclusters.yaml
- bases/infrastructure.cluster.x-k8s.io_maasmachines.yaml
- bases/infrastructure.cluster.x-k8s.io_maasmachinetemplates.yaml
# +kubebuilder:scaffold:crdkustomizeresource

patchesStrategicMerge:
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix.
# patches here are for enabling the conversion webhook for each CRD
# Disabled: all CRDs are single-version (v1beta1), so no conversion webhook is
# needed. Enabling it bakes conversion.strategy=Webhook + placeholder caBundle
# "Cg==" into the CRDs, which the apiserver rejects on a plain apply/clusterctl
# patch ("unable to parse bytes as PEM block"). Re-enable only with a 2nd version.
#- patches/webhook_in_maasclusters.yaml
#- patches/webhook_in_maasmachines.yaml
#- patches/webhook_in_maasmachinetemplates.yaml
# +kubebuilder:scaffold:crdkustomizewebhookpatch

# [CERTMANAGER] To enable webhook, uncomment all the sections with [CERTMANAGER] prefix.
# patches here are for enabling the CA injection for each CRD
#- patches/cainjection_in_maasclusters.yaml
#- patches/cainjection_in_maasmachines.yaml
#- patches/cainjection_in_maasmachinetemplates.yaml
# +kubebuilder:scaffold:crdkustomizecainjectionpatch

# the following config is for teaching kustomize how to do kustomization for CRDs.
configurations:
- kustomizeconfig.yaml
